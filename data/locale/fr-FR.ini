# --- Bulles d'aide (tooltips) des Parametres avances ---
Tip.Wide.Scene="La scène montrée quand plusieurs personnes parlent, ou quand il faut un plan d'ensemble. Laissez vide pour ne jamais l'utiliser."
Tip.Wide.Current="Chance de rester sur la personne déjà à l'antenne."
Tip.Wide.WideShot="Chance de basculer sur le plan large."
Tip.Wide.LastSpeaker="Chance de rester sur la dernière personne ayant parlé."
Tip.Rhythm.MinShot="Chaque plan reste affiché au moins ce temps avant qu'un changement soit permis (évite les coupes nerveuses)."
Tip.Rhythm.MaxShot="Au-delà de ce temps sur un même plan, Flowspire rafraîchit la vue pour varier les plans."
Tip.Rhythm.MaxRepeats="Au-delà de ce nombre de passages sur un MÊME plan, Flowspire respire : il re-tire un autre plan de la personne (autre caméra, réaction, plan large) selon les poids. Compte par plan, pas par personne. 0 = désactivé."
Tip.Rhythm.PingPong="Évite de revenir trop vite sur une personne qui vient juste de parler. 0 = désactivé ; n'agit qu'au-dessus du temps mini de plan."
Tip.Rhythm.Threshold="Niveau sonore à partir duquel une personne est considérée comme parlant. Plus bas = plus sensible."
Tip.Rhythm.Attack="Durée de voix continue avant de considérer qu'une personne parle (ignore les bruits brefs : clic, choc). Plus court = plus réactif."
Tip.Rhythm.SilenceDelay="Durée de blanc avant de considérer qu'une PERSONNE a cessé de parler (détection par personne). Plus long = plus tolérant aux respirations, mais ralentit AUSSI le passage à un autre intervenant."
Tip.Rhythm.SilenceReaction="Quand PLUS PERSONNE ne parle, on reste sur le plan courant pendant ce délai avant de basculer (plan large / dernier locuteur). N'affecte QUE le silence : passer à un intervenant qui prend la parole reste immédiat. « Immédiat » = on bascule sans attendre."
Tip.Speakers.Name="Le nom affiché de cette personne (sert juste à vous repérer)."
Tip.Speakers.Source="La source audio OBS de cette personne : c'est elle qu'on écoute pour savoir si elle parle."
Tip.Cameras.Weight="Choisissez la scène à montrer pour cette personne, puis réglez son poids : plus il est élevé, plus cette scène sort souvent (par rapport aux autres scènes de la même personne)."

