# --- Tooltips for the advanced settings ---
Tip.Wide.Scene="The scene shown when several people talk, or when a group shot is needed. Leave empty to never use it."
Tip.Wide.Current="Chance to stay on the person already on air."
Tip.Wide.WideShot="Chance to switch to the wide shot."
Tip.Wide.LastSpeaker="Chance to stay on the last person who spoke."
Tip.Rhythm.MinShot="Each shot stays on screen at least this long before a change is allowed (avoids jumpy cuts)."
Tip.Rhythm.MaxShot="After this long on the same shot, Flowspire refreshes the view to add variety."
Tip.Rhythm.MaxRepeats="Beyond this many passes on the SAME shot, Flowspire breathes: it redraws another of the person's shots (other camera, reaction, wide) by weight. Counts per shot, not per person. 0 = disabled."
Tip.Rhythm.PingPong="Avoids cutting back too quickly to someone who just spoke. 0 = disabled; only takes effect above the minimum shot time."
Tip.Rhythm.Threshold="Sound level above which a person counts as speaking. Lower = more sensitive."
Tip.Rhythm.Attack="How long of continuous voice before a person counts as speaking (ignores brief noises: a click, a knock). Shorter = more reactive."
Tip.Rhythm.SilenceDelay="How long of a blank before a PERSON is considered to have stopped speaking (per-person detection). Longer = more tolerant of breaths, but also slows switching to another speaker."
Tip.Rhythm.SilenceReaction="When NOBODY speaks, Flowspire stays on the current shot for this delay before switching (wide shot / last speaker). Only affects silence: switching to a speaker who starts talking stays immediate. “Immediate” = switch without waiting."
Tip.Speakers.Name="The display name for this person (just to help you recognize them)."
Tip.Speakers.Source="This person's OBS audio source: it's what we listen to in order to tell whether they're speaking."
Tip.Cameras.Weight="Pick the scene to show for this person, then set its weight: the higher it is, the more often this scene appears (relative to this person's other scenes)."

